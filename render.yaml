services:
  - type: web
    name: online-quiz-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /
    envVars:
      - key: APP_NAME
        value: Jamhuriya Quiz
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        sync: false
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: online-quiz-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: online-quiz-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: online-quiz-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: online-quiz-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: online-quiz-db
          property: password
      - key: CORS_ALLOWED_ORIGINS
        sync: false

  - type: web
    name: online-quiz-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: online-quiz-db
    plan: free
    databaseName: online_quiz
    user: online_quiz_user
